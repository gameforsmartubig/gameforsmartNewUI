stages:
  - build_and_deploy

deploy_proyek:
  stage: build_and_deploy
  tags:
    - nodejs
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - echo "🚀 Memulai proses kilat..."
    
    # 1. Install & Build di Robot Runner (Jauh lebih cepat daripada lewat SSH)
    - npm ci --prefer-offline
    - npm run build
    
    # 2. Kirim SEMUA file yang sudah jadi (termasuk node_modules) ke aaPanel
    # Ini jauh lebih cepat daripada nunggu 'npm install' di server tujuan
    - rsync -avz --delete --exclude '.git' ./ root@192.168.1.157:/www/wwwroot/gameforsmartNewUI/
    
    # 3. Server aaPanel CUMA diperintah restart (Tugas ringan)
    - ssh -o StrictHostKeyChecking=no root@192.168.1.157 "pm2 startOrReload /www/wwwroot/gameforsmartNewUI/ecosystem.config.js"
    
    - echo "✅ Selesai dalam sekejap!"
  only:
    - main